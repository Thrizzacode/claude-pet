name: Release

on:
  push:
    tags:
      - 'v*.*.*'
    branches:
      - main

jobs:
  release:
    if: "startsWith(github.ref, 'refs/tags/') || !startsWith(github.event.head_commit.message, 'chore: release')"
    permissions:
      contents: write
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build (cache warming, main branch only)
        if: "!startsWith(github.ref, 'refs/tags/')"
        run: pnpm tauri build --target x86_64-pc-windows-msvc --no-bundle

      - name: Build and release
        if: startsWith(github.ref, 'refs/tags/')
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Claude Pet v__VERSION__'
          releaseBody: |
            ## 更新內容

            請查看 [提交紀錄](https://github.com/Thrizzacode/claude-pet/commits/main) 了解詳細變更。
          releaseDraft: false
          prerelease: false
          args: '--target x86_64-pc-windows-msvc'
